<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识大战难题 - 学习版塔防</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg-layer"></div>

<!-- 背景音乐 -->
<audio id="bgMusic" loop preload="auto">
    <source src="The_Last_Ledger.mp3" type="audio/mpeg">
</audio>

<!-- 音乐控制器（始终悬浮在右上角） -->
<div id="musicControl" class="fixed top-3 right-3 z-[110] flex items-center gap-2 bg-[var(--card)] border border-[var(--border)] rounded-xl px-3 py-2 opacity-80">
    <button id="musicBtn" title="开关音乐">🎵</button>
    <input type="range" id="volSlider" min="0" max="100" value="60" title="音量调节">
</div>

<!-- 开始界面 -->
<div id="startScreen" class="relative z-10 min-h-screen flex items-center justify-center p-4">
    <div class="text-center max-w-2xl w-full">
        <h1 class="game-title text-4xl md:text-5xl text-[var(--accent)] mb-3">知识大战难题</h1>
        <p class="text-[var(--muted)] mb-8">选择你的挑战模式</p>

        <div class="grid md:grid-cols-2 gap-6 mb-4 max-w-xl mx-auto">
            <!-- 经典模式 -->
            <button id="btnClassic" class="btn-mode">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-lg bg-[var(--accent)] flex items-center justify-center text-black font-bold">5</div>
                    <div class="text-left">
                        <div class="font-bold text-lg">经典模式</div>
                        <div class="text-xs text-[var(--muted)]">标准数值 | 5波僵尸</div>
                    </div>
                </div>
                <p class="text-xs text-[var(--fg)] opacity-80">适合初学者，体验完整的防守流程。</p>
            </button>

            <!-- 无限模式 -->
            <button id="btnEndless" class="btn-mode">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-lg bg-[var(--accent2)] flex items-center justify-center text-black font-bold">∞</div>
                    <div class="text-left">
                        <div class="font-bold text-lg">无限模式</div>
                        <div class="text-xs text-[var(--muted)]">植物增强 | 无尽挑战</div>
                    </div>
                </div>
                <p class="text-xs text-[var(--fg)] opacity-80">植物更强，僵尸更弱，但波次无限。看你能坚持多久！</p>
            </button>
        </div>

        <!-- 测试模式 -->
        <div class="max-w-xl mx-auto mb-8">
            <button id="btnTest" class="btn-mode w-full opacity-60 hover:opacity-100 border-dashed">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-[var(--muted)] flex items-center justify-center text-black font-bold text-lg">🔧</div>
                    <div class="text-left">
                        <div class="font-bold text-lg">测试模式</div>
                        <div class="text-xs text-[var(--muted)]">跳过答题 | 随机铺植物 | 仅供调试</div>
                    </div>
                </div>
            </button>
        </div>

        <div class="bg-[var(--card)] p-4 rounded-lg border border-[var(--border)] text-left max-w-xl mx-auto">
            <div class="text-sm font-bold mb-2 text-[var(--accent)]">学科图鉴</div>
            <div class="grid grid-cols-3 gap-2 text-xs">
                <div><span class="text-[var(--english)]">●</span> 英语向日葵 (产能)</div>
                <div><span class="text-[var(--math)]">●</span> 数学射手 (攻击)</div>
                <div><span class="text-[var(--physics)]">●</span> 物理冰冻 (减速)</div>
                <div><span class="text-[var(--chinese)]">●</span> 语文坚果 (防御)</div>
                <div><span class="text-[var(--biology)]">●</span> 生物地雷 (爆发)</div>
                <div><span class="text-[var(--politics)]">●</span> 道法火焰 (穿透)</div>
            </div>
        </div>
    </div>
</div>

<!-- 游戏界面 -->
<div id="gameScreen" class="hidden relative z-10 p-2 md:p-4 h-screen flex flex-col">
    <!-- 顶栏 -->
    <div class="flex flex-wrap items-center justify-between gap-2 mb-2">
        <div class="flex items-center gap-2">
            <div class="energy-display">
                <div class="energy-icon"></div>
                <span class="font-bold text-[var(--accent2)] text-base" id="energyNum">50</span>
            </div>
            <div class="bg-[var(--card)] px-2 py-1 rounded-lg border border-[var(--border)] text-sm">
                <span class="text-[var(--muted)] text-xs">波次</span>
                <span class="font-bold text-[var(--fg)] ml-1" id="waveNum">准备中</span>
            </div>
            <div class="bg-[var(--card)] px-2 py-1 rounded-lg border border-[var(--border)] text-sm">
                <span class="text-[var(--muted)] text-xs">得分</span>
                <span class="font-bold text-[var(--accent)] ml-1" id="scoreNum">0</span>
            </div>
        </div>
        <div class="flex gap-2">
             <span id="modeIndicator" class="text-xs text-[var(--muted)] bg-[var(--card)] px-2 py-1 rounded border border-[var(--border)] hidden md:block">经典模式</span>
             <button id="quizBrowserBtn" class="hidden text-xs px-2 py-1 rounded border border-dashed border-[var(--border)] text-[var(--muted)] hover:text-[var(--fg)]">📋 题目浏览</button>
             <button id="pauseBtn" class="text-xs px-2 py-1 rounded border border-[var(--border)] text-[var(--muted)] hover:text-[var(--fg)]">暂停</button>
        </div>
    </div>

    <!-- 植物卡片栏 -->
    <div class="flex gap-1 mb-2 p-2 bg-[var(--card)] rounded-lg border border-[var(--border)] overflow-x-auto" id="cardBar"></div>

    <!-- 游戏画布容器 -->
    <div class="flex-1 flex items-center justify-center">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 波次提示 -->
    <div id="waveAlert" class="wave-alert">
        <div class="game-title text-2xl text-[var(--accent)]" id="alertText">第 1 波来袭！</div>
    </div>
</div>

<!-- 题目浏览面板（仅测试模式） -->
<div id="quizBrowserModal" class="modal hidden">
    <div class="modal-box" style="max-width:560px; max-height:80vh; display:flex; flex-direction:column;">
        <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-base">📋 题目浏览</h3>
            <button id="quizBrowserClose" class="text-[var(--muted)] hover:text-[var(--fg)] text-lg leading-none">✕</button>
        </div>
        <div id="quizBrowserTabs" class="flex gap-2 flex-wrap mb-3"></div>
        <div id="quizBrowserList" class="overflow-y-auto flex-1 pr-1"></div>
    </div>
</div>

<!-- 答题弹窗 -->
<div id="quizModal" class="modal hidden">
    <div class="modal-box">
        <div class="text-center mb-3">
            <span class="text-xs px-3 py-1 rounded-full bg-[var(--muted)]" id="quizSubject">数学</span>
        </div>
        <h3 class="text-base font-bold mb-4 text-center" id="quizQuestion">问题加载中...</h3>
        <div class="grid grid-cols-1 gap-2" id="quizOptions"></div>
        <div class="mt-3 text-center text-[var(--muted)] text-xs">剩余: <span id="quizTimer">15</span>秒</div>
    </div>
</div>

<!-- 结算弹窗 -->
<div id="endModal" class="modal hidden">
    <div class="modal-box text-center">
        <h2 class="game-title text-3xl mb-4" id="endTitle">游戏结束</h2>
        <p class="text-[var(--muted)] mb-6" id="endMsg">再接再厉！</p>
        <div class="grid grid-cols-2 gap-4 mb-6 bg-[var(--bg)] p-4 rounded-lg">
            <div><p class="text-xs text-[var(--muted)]">最终得分</p><p class="text-2xl font-bold text-[var(--accent2)]" id="endScore">0</p></div>
            <div><p class="text-xs text-[var(--muted)]">最高波次</p><p class="text-2xl font-bold text-[var(--accent)]" id="endWave">0</p></div>
        </div>
        <button id="btnRestart" class="btn-main">再来一局</button>
    </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
